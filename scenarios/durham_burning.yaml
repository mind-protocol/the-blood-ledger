    to: thing_tinder_box

  - type: carries
    from: char_ligulf
    to: thing_ligulf_seal

  - type: belief
    character: char_player
    narrative: narr_knife_intent
    believes: 1.0
    originated: 1.0
    hides: 1.0
    source: witnessed

  - type: belief
    character: char_player
    narrative: narr_timber_memory
    believes: 1.0
    source: witnessed

  - type: belief
    character: char_player
    narrative: narr_tax_evidence
    believes: 1.0
    source: witnessed

  - type: belief
    character: char_player
    narrative: narr_ligulf_fall
    believes: 0.8
    heard: 1.0
    source: told

  - type: belief
    character: char_ligulf
    narrative: narr_ligulf_fall
    believes: 1.0
    originated: 1.0
    source: witnessed

  - type: belief
    character: char_ligulf
    narrative: narr_knife_intent
    believes: 0.5
    source: inferred
    narrator_notes: "Ligulf suspects player's darker thoughts. He's not sure if he approves or not."

  - type: belief
    character: char_player
    narrative: narr_cumin_killed_family
    believes: 1.0
    originated: 1.0
    source: witnessed

  - type: belief
    character: char_player
    narrative: narr_durham_will_burn
    believes: 1.0
    source: inferred

  - type: belief
    character: char_player
    narrative: narr_ligulf_alliance
    believes: 1.0
    source: witnessed

  - type: belief
    character: char_player
    narrative: narr_bishop_watching
    believes: 0.6
    heard: 0.8
    source: rumor

  - type: belief
    character: char_player
    narrative: narr_cumin_earl_durham
    believes: 1.0
    source: witnessed

  # Companion links (Ligulf)
  - type: present
    from: char_ligulf
    to: place_durham

  - type: belief
    character: char_ligulf
    narrative: narr_ligulf_alliance
    believes: 1.0
    originated: 1.0
    source: witnessed

  - type: belief
    character: char_ligulf
    narrative: narr_durham_will_burn
    believes: 0.9
    source: inferred
    narrator_notes: "Ligulf believes it but he's working to make it happen, not just waiting."

  - type: belief
    character: char_ligulf
    narrative: narr_cumin_killed_family
    believes: 1.0
    heard: 1.0
    source: told
    narrator_notes: "He knows your story. It's why he trusts you."

  - type: belief
    character: char_ligulf
    narrative: narr_bishop_watching
    believes: 0.8
    source: inferred

  # Cumin links
  - type: present
    from: char_cumin
    to: place_durham_castle

# =============================================================================
# COMPANION
# =============================================================================

companion:
  id: char_ligulf
  relationship: "fellow dispossessed"
  why_stays: "You both lost everything to Cumin. He's organizing. You're watching. Together you wait."
  starting_disposition: cold_alliance
  voice_note: "Speaks little. Watches everything. A thegn's bearing under peasant clothes. He's planning something."

# =============================================================================
# OPENING
# =============================================================================

opening:
  time: evening
  weather: cold, clear
  place: place_durham
  characters_present: [char_ligulf]
  narration: |
    Durham crouches under Cumin's shadow.
    You've been here three months. Watching.
    Counting guards. Noting routines.
    Waiting for the fire you know is coming.

    Ligulf finds you in the alley by the cathedral.
    He was a thegn once. Now he's something else.
    Something patient. Something dangerous.

    "Cumin hanged two men today," he says quietly.
    "For stealing bread their own farms grew."
    He looks toward the castle.
    "The city won't forget. They never do."

    In the distance, smoke rises from the castle kitchens.
    Ordinary smoke. For now.
