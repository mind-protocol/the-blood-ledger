thinking: |
  The tension 'tension_edmund' flipped because Edmund's betrayal narrative was contradicted by the 'Edmund Was Forced' rumor, and their combined pressure exceeded the breaking point. This public confrontation creates an opportunity for new narratives around Edmund's character.

event:
  summary: "A public confrontation erupts in York regarding Edmund's actions, forcing him to address the accusations."
  location: place_york_market
  witnesses: [char_player, char_aldric, char_townsfolk_1, char_townsfolk_2]
  caused_by: [narr_edmund_betrayal, narr_edmund_forced]
  impact: "escalated public scrutiny and a direct challenge to Edmund's authority"

graph_mutations:
  new_narratives:
    - id: narr_edmund_confronted
      name: "Edmund Confronted in York"
      content: "Edmund was publicly confronted in York's market square about his alleged betrayal and the conflicting rumors surrounding his actions."
      type: account
      about: { characters: [char_edmund, char_player, char_aldric], places: [place_york_market] }
      tone: tense
      focus: 1.8
      truth: 1.0
      narrator_notes: "This narrative captures the immediate public event of the confrontation."

    - id: narr_edmund_denial
      name: "Edmund's Fierce Denial"
      content: "Edmund vehemently denied the accusations, claiming he was coerced and that the rumors were spread by his enemies to undermine his family."
      type: rumor
      about: { characters: [char_edmund, char_player, char_aldric], places: [place_york_market] }
      tone: defiant
      focus: 1.5
      truth: 0.2 # He's mostly lying
      narrator_notes: "Edmund's denial will create new questions and potentially new tensions."

  new_beliefs:
    - character: char_player
      narrative: narr_edmund_confronted
      believes: 1.0
      heard: 1.0
      source: witnessed

    - character: char_aldric
      narrative: narr_edmund_confronted
      believes: 1.0
      heard: 1.0
      source: witnessed

    - character: char_player
      narrative: narr_edmund_denial
      believes: 0.3
      heard: 1.0
      source: witnessed
      doubts: 0.7

  new_links:
    - type: relates_to
      source_id: narr_edmund_confronted
      target_id: narr_edmund_betrayal
      elaborates: 1.0

    - type: relates_to
      source_id: narr_edmund_confronted
      target_id: narr_edmund_forced
      elaborates: 1.0

    - type: relates_to
      source_id: narr_edmund_denial
      target_id: narr_edmund_forced
      supports: 0.8

  tension_updates:
    - id: tension_edmund
      set: { pressure: 0.1, breaking_point: 0.9, pressure_type: "gradual" } # Reset tension, it has broken

  character_movements: []
  new_tensions: []
  modifier_changes: []

cascades:
  - tension_edmund_new_rumors # A new tension might emerge from the denial

world_injection:
  time_since_last: "1 hour"
  breaks: ["tension_edmund"]
  news_arrived: ["Edmund confronted in York"]
  tension_changes: {tension_edmund: "reset"}
  interruption: null
  atmosphere_shift: "A palpable tension now hangs over York. People whisper openly in the streets."
  narrator_notes: "The confrontation was dramatic. Player was present, witnessing Edmund's desperation. This creates new avenues for exploration around Edmund's character and the loyalty of the townsfolk."