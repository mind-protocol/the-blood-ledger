# =============================================================================
# MODULE MANIFEST
# =============================================================================
#
# Maps code to documentation. Used by `ngram doctor` to identify unmapped code.
# Updated 2025-12-19: Code restructured to match docs areas.
#
# =============================================================================

modules:
  # ---------------------------------------------------------------------------
  # PHYSICS - Core energy/weight mechanics (engine/physics/)
  # ---------------------------------------------------------------------------
  physics-core:
    code: "engine/physics/**"
    docs: "docs/physics/"
    maturity: CANONICAL
    owner: agent
    entry_points:
      - tick.py
      - constants.py
    notes: |
      Core physics engine: energy flow, weight computation, narrative mechanics.
      Includes graph/ subdirectory with database operations.

  physics-graph:
    code: "engine/physics/graph/**"
    docs: "docs/physics/"
    maturity: CANONICAL
    entry_points:
      - graph_ops.py
      - graph_queries.py
    internal:
      - graph_query_utils.py
      - graph_queries_moments.py
      - graph_queries_search.py
      - graph_ops_apply.py
      - graph_ops_moments.py
      - graph_ops_links.py
    notes: |
      Graph database operations - the core of the physics system.
      graph_ops.py: 1094 lines (reduced from 1611 via LinkCreationMixin extraction).
      graph_ops_apply.py: 697 lines (extracted apply() method and helpers).
      graph_ops_links.py: 573 lines (extracted link creation methods).
      graph_queries.py: 892 lines (reduced via SearchQueryMixin extraction).
      graph_queries_search.py: 285 lines (extracted search methods).

  physics-moments:
    code: "engine/moments/**"
    docs: "docs/physics/"
    maturity: CANONICAL
    notes: |
      Moment handlers and lifecycle management.

  moment-graph:
    code: "engine/moment_graph/**"
    docs: "docs/physics/"
    maturity: CANONICAL
    notes: |
      Moment graph specific operations.

  graph-health:
    code: "engine/graph/**"
    docs: "docs/physics/"
    maturity: CANONICAL
    notes: |
      Graph health checks and validation utilities.

  # ---------------------------------------------------------------------------
  # WORLD - Content layer (engine/world/)
  # ---------------------------------------------------------------------------
  world-map:
    code: "engine/world/map/**"
    docs: "docs/world/map/"
    maturity: CANONICAL
    notes: |
      Semantic search and map queries.

  # ---------------------------------------------------------------------------
  # INFRASTRUCTURE - Supporting systems (engine/infrastructure/)
  # ---------------------------------------------------------------------------
  api:
    code: "engine/infrastructure/api/**"
    docs: "docs/infrastructure/"
    maturity: CANONICAL
    entry_points:
      - app.py
    notes: |
      FastAPI backend. app.py is MONOLITH (1055 lines) - needs splitting.

  embeddings:
    code: "engine/infrastructure/embeddings/**"
    docs: "docs/infrastructure/embeddings/"
    maturity: CANONICAL
    notes: |
      Vector embeddings for semantic search.

  history:
    code: "engine/infrastructure/history/**"
    docs: "docs/infrastructure/history/"
    maturity: CANONICAL
    notes: |
      Playthrough history and chronicle.

  memory:
    code: "engine/infrastructure/memory/**"
    docs: "docs/infrastructure/"
    maturity: CANONICAL
    notes: |
      Scene memory and context management.

  orchestration:
    code: "engine/infrastructure/orchestration/**"
    docs: "docs/infrastructure/"
    maturity: CANONICAL
    notes: |
      Agent orchestration and coordination.

  # ---------------------------------------------------------------------------
  # SCHEMA - Data models (engine/models/)
  # ---------------------------------------------------------------------------
  models:
    code: "engine/models/**"
    docs: "docs/schema/"
    maturity: CANONICAL
    notes: |
      Data models and type definitions.

  # ---------------------------------------------------------------------------
  # AGENTS - AI agents (agents/)
  # ---------------------------------------------------------------------------
  narrator:
    code: "agents/narrator/**"
    docs: "docs/agents/narrator/"
    maturity: CANONICAL
    owner: agent
    entry_points:
      - CLAUDE.md
    notes: |
      AI narrator agent for scene generation.

  world-runner:
    code: "agents/world_runner/**"
    docs: "docs/agents/world-runner/"
    maturity: CANONICAL
    notes: |
      World simulation agent for background events.

  # ---------------------------------------------------------------------------
  # FRONTEND - Next.js application (frontend/)
  # ---------------------------------------------------------------------------
  frontend:
    code: "frontend/**"
    docs: "docs/frontend/"
    maturity: CANONICAL
    owner: agent
    patterns:
      - "Next.js App Router"
      - "React Server Components"
      - "Tailwind CSS"
    notes: |
      Next.js frontend application.

  frontend-scene:
    code: "frontend/components/scene/**"
    docs: "docs/frontend/scene/"
    maturity: CANONICAL
    notes: |
      Scene display components.

  # ---------------------------------------------------------------------------
  # CLI TOOLS - Agent utilities (tools/)
  # ---------------------------------------------------------------------------
  cli-tools:
    code: "tools/**"
    docs: "docs/infrastructure/cli-tools/"
    maturity: CANONICAL
    notes: |
      CLI utilities for agents: stream_dialogue.py for narration streaming,
      image_generation for Ideogram API integration.

