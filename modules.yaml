# =============================================================================
# MODULE MANIFEST
# =============================================================================
#
# This file maps code to documentation and carries rich context about each module.
#
# WHEN TO UPDATE:
# - Creating new code directories → add module mapping
# - Creating new doc modules → add mapping
# - Refactoring/moving code → update patterns
# - Changing module maturity → update status
#
# VALIDATION:
# `ngram validate` warns about unmapped code directories.
#
# =============================================================================

modules:
  # ---------------------------------------------------------------------------
  # EXAMPLE MODULE (delete or modify)
  # ---------------------------------------------------------------------------
  # example:
  #   code: "src/example/**"           # Glob pattern for source files
  #   docs: "docs/area/example/"       # Path to documentation
  #   tests: "tests/example/"          # Path to tests (optional)
  #
  #   maturity: DESIGNING              # DESIGNING | CANONICAL | PROPOSED | DEPRECATED
  #   owner: agent                     # agent | human | team-name
  #
  #   entry_points:                    # Main files to start reading (optional)
  #     - index.ts
  #     - Example.tsx
  #
  #   internal:                        # Implementation details, not public API (optional)
  #     - helpers.ts
  #     - utils.ts
  #
  #   depends_on:                      # Other modules this requires (optional)
  #     - types
  #     - utils
  #
  #   patterns:                        # Conventions to follow (optional)
  #     - "React functional components"
  #     - "Tailwind styling"
  #
  #   notes: |                         # Quick context (optional)
  #     Brief description of what this module does
  #     and any important context for working with it.

# =============================================================================
# YOUR MODULES
# =============================================================================

# Uncomment and modify as you create modules:

# types:
#   code: "src/types/**"
#   docs: "docs/core/types/"
#   maturity: CANONICAL
#   owner: human
#   notes: |
#     Core type definitions. Changes affect entire codebase.

# Add more modules as they emerge...

  design-vision:
    code: "docs/design/**"
    docs: "docs/design/"
    maturity: DESIGNING
    owner: agent
    entry_points:
      - docs/design/PATTERNS_Vision.md
      - docs/design/SYNC_Vision.md
    patterns:
      - "Documentation chain for vision and experience goals"
    notes: |
      Vision and experience design documentation for The Blood Ledger.

  world-map:
    code: "engine/world/map/**"
    docs: "docs/world/map/"
    maturity: DESIGNING
    owner: agent
    entry_points:
      - engine/world/map/semantic.py
    patterns:
      - "Semantic search over graph embeddings"
    notes: |
      Map system documentation and semantic search layer.

  world-scraping:
    code: "data/scripts/scrape/**"
    docs: "docs/world/scraping/"
    additional_code:
      - "data/scripts/inject_world.py"
    maturity: DESIGNING
    owner: agent
    entry_points:
      - data/scripts/scrape/phase1_geography.py
      - data/scripts/inject_world.py
    patterns:
      - "Pipeline ETL with phase scripts"
      - "YAML intermediates for auditability"
    notes: |
      World data scraping pipeline and injection scripts.
      Outputs to data/world and loads into FalkorDB via GraphOps.

  world-runner:
    code: "engine/infrastructure/orchestration/world_runner.py"
    docs: "docs/agents/world-runner/"
    additional_code:
      - "agents/world_runner/**"
    maturity: CANONICAL
    owner: agent
    entry_points:
      - engine/infrastructure/orchestration/world_runner.py
      - agents/world_runner/CLAUDE.md
    patterns:
      - "Stateless LLM runner"
      - "Interrupt/resume injection"
    notes: |
      World Runner agent and orchestration service. Converts flipped tensions
      into graph mutations and narrator injection payloads.
