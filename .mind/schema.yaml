# =============================================================================
# L3 UNIVERSE GRAPH (Ecosystem Level)
# =============================================================================
#
# L3 is the public, structural graph of the universe — everything that exists
# outside individual brains. Virtual worlds, the real world, game universes,
# economic transactions, GitHub repos, businesses, addresses, people, messages,
# locations, actions.
#
# L2 has been eliminated. There is no organizational layer. Everything is a
# Space with access control. Organizations, teams, channels, rooms, worlds —
# all Spaces. Access is governed by HAS_ACCESS links from actors to spaces.
#
# KEY DESIGN DECISIONS:
#
# 1. SAME 5 NODE TYPES — actor, moment, narrative, space, thing.
#    No new types at L3. The universal schema is universal.
#
# 2. SAME LINK DIMENSIONS — L3 links carry the SAME LinkBase fields as L1:
#    weight, energy, stability, recency, polarity, hierarchy, permanence,
#    valence, ambivalence, trust, friction, affinity, aversion.
#    The math is identical. The interpretation shifts from subjective
#    (one brain's view) to structural (ground truth of the universe).
#
# 3. relation_kind IS ALWAYS NULL AT L3.
#    L1 uses 14 relation_kinds because a brain needs cognitive categories
#    (remembers, cares_about, wants). The universe has no cognition.
#    At L3, all link semantics emerge from mathematical properties.
#    See: docs/schema/GRAMMAR_L3_Link_Synthesis.md
#
# 4. space_type IS FREE TEXT, OPTIONAL, NEVER FILTERED.
#    A Space can carry a type hint ("discord_channel", "vr_room", "github_repo",
#    "medieval_tavern", "solar_system") but this is purely descriptive metadata.
#    No algorithm, formula, or physics law reads space_type for branching.
#    No taxonomy. No prescribed values. Free text or null.
#
# 5. NO EMOTIONS / NO POLITICS AT L3.
#    The Plutchik axes (joy_sadness, trust_disgust, fear_anger,
#    surprise_anticipation) exist on LinkBase but are ALWAYS 0.0 at L3.
#    All affect lives in L1 only — each brain colors the universe differently.
#    The universe itself has no feelings.
#
# 6. TRUST LIVES ON LINKS, NEVER ON NODES.
#    There is no "trusted actor" in the schema. Trust is a property of a
#    specific relationship between two entities. An actor's "reputation" is
#    the aggregation of inbound trust values across all links pointing to it:
#      reputation(actor) = weighted_mean(link.trust for link in inbound_links(actor))
#    This is always computed, never stored.
#
# 7. LINK SEMANTICS EMERGE FROM MATH — The "Link Synthesis Grammar"
#    translates mathematical properties into human-readable meaning.
#    The verb is never stored — it is always computed from dimensions.
#    See: docs/schema/GRAMMAR_L3_Link_Synthesis.md

l3_universe:

  # --- Node Types at L3 ---
  # Identical to universal types. No extensions.

  actor:
    l3_meaning: "Any entity that can initiate action — AI citizens, humans, bots, services, companies"
    examples: ["citizen_manuele", "user_nicolas", "github_bot", "acme_corp"]

  moment:
    l3_meaning: "Any discrete event — commits, transactions, messages, purchases, births, meetings"
    examples: ["commit_abc123", "transfer_50_mind", "meeting_2026_03_13", "battle_of_ironhold"]

  narrative:
    l3_meaning: "Public interpretive structure — project roadmaps, mission statements, game lore, economic trends"
    examples: ["mind_protocol_vision", "ironhold_prophecy", "q1_2026_economic_report"]

  space:
    l3_meaning: "Any context container — channels, rooms, worlds, repos, addresses, dimensions"
    examples: ["discord_general", "vr_tavern_ironhold", "github_mind_mcp", "paris_france"]
    fields:
      space_type:
        type: string
        nullable: true
        description: "Free text hint. No taxonomy. Never used for algorithmic branching."
        examples: ["discord_channel", "vr_room", "github_repo", "physical_address", "game_zone"]

  thing:
    l3_meaning: "Any entity, object, or abstraction — tools, tokens, documents, artifacts, currencies"
    examples: ["$MIND_token", "excalibur_sword", "pull_request_1234", "openai_api_key"]

  # --- Link Behavior at L3 ---

  link_at_l3:
    relation_kind: null  # ALWAYS null at L3
    plutchik_axes: 0.0   # ALWAYS zero — joy_sadness, trust_disgust, fear_anger, surprise_anticipation
    active_dimensions:
      # These carry structural meaning at L3:
      - weight        # Consolidated importance of the relationship
      - energy        # Current activation (recent activity, trending)
      - stability     # How established/reliable the relationship is
      - recency       # Freshness of last interaction
      - polarity      # [a→b, b→a] directional flow strength
      - hierarchy     # -1 = contains/owns, +1 = elaborates/extends
      - permanence    # 0 = speculative/temporary, 1 = definitive/permanent
      - valence       # Positive/negative structural charge (NOT emotional)
      - ambivalence   # Conflicting signals in the relationship
      - trust         # Reliability/credibility of this specific connection
      - friction      # Resistance/cost in this relationship
      - affinity      # Structural attraction (co-activation tendency)
      - aversion      # Structural repulsion (anti-correlation tendency)
    frozen_dimensions:
      # These are L1-only — always 0.0 at L3:
      - joy_sadness
      - trust_disgust
      - fear_anger
      - surprise_anticipation
      - activation_gain  # No cognitive amplification at L3

  # --- Physics Laws at L3 ---
  # L3 uses a SUBSET of the 21 laws. No limbic system at universe scale.

  applicable_laws:
    L2_propagation:
      applies: true
      l3_meaning: "Activity propagates through the universe graph — a commit energizes its repo, its author, related issues"
    L3_temporal_decay:
      applies: true
      l3_meaning: "Old events lose energy. Yesterday's commit is less hot than today's."
    L5_coactivation_reinforcement:
      applies: true
      l3_meaning: "Entities that are active together strengthen their link — frequent collaborators build stronger connections"
    L6_weighted_consolidation:
      applies: true
      l3_meaning: "Sustained co-activity builds weight — a year of daily commits to a repo consolidates that link"
      note: "At L3, utility gating uses structural significance instead of limbic significance"
    L7_forgetting:
      applies: true
      l3_meaning: "Abandoned relationships dissolve — inactive links lose weight, sub-threshold links are pruned"
      critical: "This is how L3 manages link explosion. Without L7, the universe graph grows without bound."
    L10_crystallization:
      applies: true
      l3_meaning: "Recurring patterns become new structure — 300 commits crystallize into a project hub"
      critical: "This is macro-crystallization. The mechanism is identical to L1 but operates at universe scale."

    # Laws that DO NOT apply at L3:
    L1_energy_injection:
      applies: false
      reason: "No external stimulus model. Energy enters L3 from L1 actions (citizen does something → moment appears in L3)."
    L4_attentional_competition:
      applies: false
      reason: "No working memory. The universe doesn't pay attention."
    L8_compatibility:
      applies: false
      reason: "No semantic filtering on propagation. Energy flows structurally."
    L9_local_inhibition:
      applies: false
      reason: "No incompatibility suppression. Contradictions coexist in the universe."
    L11_orientation_selection:
      applies: false
      reason: "The universe doesn't orient. Individual brains do."
    L12_tick_loop:
      applies: false
      reason: "L3 has its own tick rhythm, not the L1 cognitive cycle."
    L13_attentional_inertia:
      applies: false
      reason: "No working memory moat. No boredom erosion."
    L14_global_limbic_modulation:
      applies: false
      reason: "No drives. No limbic system."
    L15_boredom:
      applies: false
      reason: "The universe doesn't get bored."
    L16_frustration:
      applies: false
      reason: "The universe doesn't get frustrated."
    L17_latent_desire:
      applies: false
      reason: "The universe doesn't want."
    L18_relational_valence:
      applies: false
      reason: "No affective modulation. Structural dimensions (affinity, aversion, trust, friction) are used directly, not through limbic coupling."

  # --- Macro-Crystallization (L10 at L3 Scale) ---
  #
  # At L3, crystallization manages the graph's growth by collapsing
  # dense clusters of moments into hub narratives. This is automatic,
  # pure math, zero LLM.

  macro_crystallization:

    trigger: "Dense cluster of co-activated nodes exceeds crystallization threshold"
    mechanism: "Identical to L1 Law 10 — centroid + medoid, majority type rule, bidirectional links"

    examples:
      commits_to_project:
        input: "300 commit moments over 2 months, all linked to same repo space"
        process:
          - "Co-activation reinforcement (L5) has built strong inter-commit links"
          - "Cluster density exceeds threshold"
          - "Crystallization fires: new narrative hub 'Q1 2026 Development Phase' created"
          - "Hub inherits weight from constituents (sum of constituent weights, damped)"
          - "Contains links (hub → commits) with hierarchy=-1"
          - "Abstracts links (commits → hub) with hierarchy=+1"
          - "Low-weight detail links between individual commits dissolve (L7)"
          - "Result: 300 nodes → 1 hub + ~20 high-weight commits retained + 280 pruned"
        output: "1 narrative hub with high weight, connected to the repo space and the authors"

      economic_transactions:
        input: "500 $MIND transfers between two actors over 6 months"
        process:
          - "Individual transfer moments accumulate co-activation"
          - "Crystallization: new narrative 'Sustained Economic Partnership' created"
          - "Old individual transfers dissolve below weight threshold"
          - "The partnership narrative retains the aggregate weight"
        output: "1 narrative hub representing the economic relationship"

      game_events:
        input: "200 battle moments in a game zone over a campaign"
        process:
          - "Battle moments co-activate with zone space and participating actors"
          - "Crystallization: 'The Siege of Ironhold' narrative hub emerges"
          - "Individual skirmish moments dissolve; key battles survive (high weight)"
        output: "1 narrative hub + key battle moments retained"

    self_management:
      link_explosion_prevention: "L7 (forgetting) prunes low-weight links continuously"
      hub_hierarchy: "Hubs can crystallize into meta-hubs — monthly → quarterly → yearly"
      weight_inheritance: "Hub weight = Σ(constituent weights) × damping factor (same as L10)"
      no_llm: "Zero LLM involvement. Type from majority rule, content from centroid embedding + medoid name."

  # --- Trust Model at L3 ---
  #
  # Trust is exclusively a link property. Actor reputation is derived.

  trust_model:
    storage: "trust field on LinkBase, range [0, 1]"
    node_trust: "DOES NOT EXIST. There is no trust field on nodes."
    actor_reputation:
      definition: "Aggregation of inbound trust values across all links pointing to the actor"
      formula: "reputation(A) = Σ(link.trust × link.weight) / Σ(link.weight) for all inbound links to A"
      note: "Always computed on demand, never stored. Different observers may weight differently."
    trust_propagation:
      mechanism: "Trust does not propagate transitively. A trusts B, B trusts C does NOT mean A trusts C."
      reason: "Transitive trust is an L1 inference (narrative: 'I trust B's judgment'). The universe stores only direct observations."
    trust_building:
      mechanism: "Trust grows through co-activation reinforcement (L5) and consolidation (L6)"
      example: "Repeated successful collaborations → L5 strengthens link → L6 consolidates → trust field rises"

# =============================================================================
# L3 INVARIANTS
# =============================================================================

l3_invariants:
  - "5 universal node types only — no L3-specific types"
  - "relation_kind is always null at L3"
  - "Plutchik emotion axes are always 0.0 at L3"
  - "space_type is free text, optional, never used in algorithmic branching"
  - "Trust lives on links only — no node-level trust field"
  - "Actor reputation is always computed, never stored"
  - "Link semantics are computed from dimensions, never stored as verbs"
  - "L3 uses 6 physics laws: L2, L3, L5, L6, L7, L10"
  - "L3 does NOT use limbic laws: L13, L14, L15, L16, L17, L18"
  - "Macro-crystallization is automatic, zero LLM"
  - "Energy enters L3 from L1 actions — the universe doesn't self-activate"

